<!doctype html>
<html lang="en" style="color-scheme: light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Changelog - Notomo</title>
  <meta name="description" content="Release notes for Notomo.">
  <link rel="icon" href="site/notomo-icon.png" type="image/png">
  <link rel="preconnect" href="https://rsms.me" crossorigin>
  <link href="https://rsms.me/inter/inter.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8fb;
      --text: #334155;
      --muted: #64748b;
      --line: #e2e8f0;
      --white: #0f172a;
      font-family: InterVariable, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      background:
        radial-gradient(circle at 50% -18%, rgba(148, 163, 184, 0.24), transparent 30rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      max-width: 768px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-top: 16px;
      padding-bottom: 16px;
      font-size: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--white);
      font-weight: 500;
    }

    .brand img {
      width: 24px;
      height: 24px;
      padding: 3px;
      border-radius: 6px;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08), 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      color: #64748b;
    }

    .nav-links a:hover {
      color: #0f172a;
    }

    main {
      padding: 56px 0 96px;
    }

    h1 {
      margin: 0;
      color: var(--white);
      font-size: clamp(36px, 6vw, 48px);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .intro {
      max-width: 60ch;
      margin: 16px 0 40px;
      color: #64748b;
      font-size: 16px;
      line-height: 1.65;
    }

    .release {
      padding: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.74);
      outline: 1px solid rgba(15, 23, 42, 0.08);
      outline-offset: -1px;
      box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
    }

    .release header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0;
      color: #172033;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.2;
    }

    time {
      margin-left: auto;
      color: #94a3b8;
      font-size: 14px;
      white-space: nowrap;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      color: #64748b;
      font-size: 14px;
      line-height: 1.7;
    }

    li {
      position: relative;
      padding-left: 18px;
    }

    li + li {
      margin-top: 8px;
    }

    li::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 0.72em;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #94a3b8;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 32px 0 48px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .shell {
        padding-left: 20px;
        padding-right: 20px;
      }

      .release header {
        display: block;
      }

      time {
        display: block;
        margin: 8px 0 0;
      }
    }
  </style>
</head>
<body>
  <header class="shell nav">
    <a class="brand" href="./" aria-label="Notomo home">
      <img src="site/notomo-icon.png" alt="">
      <span>Notomo</span>
    </a>
    <nav class="nav-links" aria-label="Navigation">
      <a href="./">Home</a>
      <a href="Notomo.dmg">Download</a>
    </nav>
  </header>

  <main class="shell">
    <h1>Changelog</h1>
    <p class="intro">Release notes for Notomo. This page is ready for future entries as new builds ship.</p>

    <article class="release" id="v0.3.0">
      <header>
        <h2>v0.3.0</h2>
        <time datetime="2026-05-20">May 20, 2026</time>
      </header>
      <ul>
        <li>Initial public website release.</li>
        <li>Download link points to the macOS DMG package.</li>
        <li>Sparkle update feed remains available at appcast.xml.</li>
      </ul>
    </article>
  </main>

  <footer>
    <div class="shell">&copy; 2026 Notomo</div>
  </footer>
</body>
</html>
